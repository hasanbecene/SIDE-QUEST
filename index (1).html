<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Side Quest</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --c1:#ff2d78;--c2:#c800ff;--c3:#e060cc;--c4:#bf5fff;
  --bg:#110011;--bg2:#1a0022;--bg3:#220033;
  --s1:0 0 10px #ff2d78, 0 0 30px #c800ff66;
  --theme-name:"NEON PINK";
}
body.green-theme{
  --c1:#9cff57;--c2:#4aff88;--c3:#7bcc44;--c4:#4aff88;
  --bg:#0b0f0a;--bg2:#0e1a0e;--bg3:#122012;
  --s1:0 0 10px #9cff57, 0 0 30px #4aff8844;
  --theme-name:"PIXEL GREEN";
}
body{background:var(--bg);color:var(--c1);font-family:'Courier New',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem;transition:background 0.4s,color 0.4s}
.screen{display:none;width:100%;max-width:680px}
.screen.active{display:block}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes flicker{0%,100%{opacity:1}92%{opacity:1}93%{opacity:0.6}94%{opacity:1}96%{opacity:0.8}97%{opacity:1}}
@keyframes scanline{0%{top:-10%}100%{top:110%}}
@keyframes flipIn{from{opacity:0;transform:rotateY(90deg) scale(0.85)}to{opacity:1;transform:rotateY(0) scale(1)}}
.menu-bg{
  position:relative;border-radius:0;overflow:hidden;padding:2.5rem 2rem 2rem;
  background:linear-gradient(to bottom, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.25) 50%, rgba(0,0,0,0.55) 85%, var(--bg) 100%);
}
.menu-bg::before{
  content:'';position:absolute;inset:0;z-index:0;
  background-size:cover;background-position:center top;opacity:0.82;
  transition:opacity 0.4s;
}
.menu-bg > *{position:relative;z-index:1}
.scanwrap{position:relative;text-align:center;overflow:hidden;padding:2rem 0 0.5rem}
.scanwrap::after{content:'';position:absolute;left:0;width:100%;height:40px;background:linear-gradient(transparent,rgba(255,45,120,0.08),transparent);animation:scanline 3.5s linear infinite;pointer-events:none}
body.green-theme .scanwrap::after{background:linear-gradient(transparent,rgba(156,255,87,0.08),transparent)}
.big-title{font-size:86px;font-weight:900;letter-spacing:6px;text-align:center;color:var(--c1);text-shadow:var(--s1);animation:float 3s ease-in-out infinite, flicker 5s ease-in-out infinite;line-height:1;margin-bottom:0.3rem}
.sub{font-size:11px;letter-spacing:4px;text-align:center;color:var(--c2);margin-bottom:2rem}
.menu-btn{display:block;width:240px;margin:12px auto;padding:11px 0;font-size:15px;letter-spacing:3px;background:var(--c1);border:2px solid var(--c1);outline:1px solid var(--c2);color:var(--bg);cursor:pointer;font-family:'Courier New',monospace;font-weight:700;transition:all 0.2s;text-shadow:none;opacity:0.5}
.menu-btn:hover{background:var(--c1);color:var(--bg);opacity:1;outline-color:var(--c1)}
.theme-btn{display:block;width:230px;margin:6px auto;padding:7px 0;font-size:11px;letter-spacing:3px;background:var(--c2);border:1px solid var(--c2);color:var(--bg);cursor:pointer;font-family:'Courier New',monospace;font-weight:700;transition:all 0.2s;opacity:0.5}
.theme-btn:hover{background:var(--c2);color:var(--bg);opacity:1}
.back-btn{background:transparent;border:1px solid var(--c2);color:var(--c2);opacity:0.7;font-family:'Courier New',monospace;font-size:11px;letter-spacing:2px;padding:5px 16px;cursor:pointer;margin-bottom:1.5rem;transition:all 0.15s}
.back-btn:hover{border-color:var(--c1);color:var(--c1);opacity:1}
.screen-title{font-size:26px;letter-spacing:5px;text-align:center;color:var(--c1);border-bottom:1px solid var(--c1);border-opacity:0.3;padding-bottom:0.75rem;margin-bottom:2rem;text-shadow:var(--s1);opacity:0.9}
.score-bar{display:flex;align-items:center;justify-content:space-between;border:1px solid var(--c2);padding:14px 32px;margin-bottom:2rem;background:var(--bg2);opacity:0.9;gap:40px}
.score-label{font-size:11px;letter-spacing:2px;color:var(--c2);flex:1}
.score-val{font-size:20px;font-weight:700;letter-spacing:2px;color:var(--c1);text-shadow:var(--s1);flex:1;text-align:center}
.refresh-btn{background:transparent;border:1px solid var(--c2);color:var(--c2);opacity:0.7;font-family:'Courier New',monospace;font-size:11px;letter-spacing:1px;padding:5px 16px;cursor:pointer;transition:all 0.15s;white-space:nowrap;flex-shrink:0}
.refresh-btn:hover{opacity:1;border-color:var(--c1);color:var(--c1)}
.missions-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:1.5rem}
.mission-card{border:1.5px solid var(--c2);background:var(--bg2);cursor:pointer;transition:border-color 0.2s,background 0.2s;height:155px;min-height:155px;max-height:155px;display:flex;flex-direction:column;align-items:stretch;justify-content:stretch;position:relative;overflow:hidden}
.mission-card:not(.revealed):hover{border-color:var(--c1);background:var(--bg3)}
.mission-card.revealed{cursor:default}
.card-hidden{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem;gap:8px;width:100%;height:100%;position:absolute;top:0;left:0}
.question-mark{font-size:44px;color:var(--c1);opacity:0.8;font-weight:900;text-shadow:var(--s1)}
.card-diff-badge{font-size:10px;letter-spacing:1px;padding:4px 12px;font-weight:700;border:1px solid;color:var(--c4);border-color:var(--c4)}
.diff-easy{color:var(--c4)!important;border-color:var(--c4)!important}
.diff-medium{color:var(--c1)!important;border-color:var(--c1)!important}
.diff-hard{color:#ff6600!important;border-color:#ff6600!important}
.diff-extreme{color:#ff0055!important;border-color:#ff0055!important}
.card-revealed{display:none;flex-direction:column;width:100%;height:100%;position:absolute;top:0;left:0}
.mission-card.revealed .card-hidden{display:none}
.mission-card.revealed .card-revealed{display:flex}
.card-header{padding:10px 12px 7px;border-bottom:1px solid var(--c2);width:100%;opacity:0.9}
.card-mission-label{font-size:10px;letter-spacing:2px;color:var(--c2);margin-bottom:4px}
.card-title{font-size:14px;letter-spacing:1px;color:var(--c1);font-weight:700;line-height:1.3;text-shadow:var(--s1)}
.card-body{padding:8px 12px;flex:1;overflow:hidden}
.card-desc{font-size:12px;color:var(--c3);line-height:1.55;letter-spacing:0.3px}
.card-footer{padding:8px 12px;border-top:1px solid var(--c2);display:flex;align-items:center;justify-content:space-between;width:100%;opacity:0.9}
.card-pts{font-size:12px;font-weight:700;letter-spacing:1px;border:1px solid;padding:3px 9px;color:var(--c1);border-color:var(--c1)}
.pts-easy{color:var(--c4)!important;border-color:var(--c4)!important}
.pts-medium{color:var(--c1)!important;border-color:var(--c1)!important}
.pts-hard{color:#ff6600!important;border-color:#ff6600!important}
.pts-extreme{color:#ff0055!important;border-color:#ff0055!important}
.complete-btn{font-size:11px;letter-spacing:1px;padding:4px 12px;background:transparent;border:1px solid var(--c1);color:var(--c1);cursor:pointer;font-family:'Courier New',monospace;transition:all 0.15s}
.complete-btn:hover:not(:disabled){background:var(--c1);color:var(--bg)}
.complete-btn.done{border-color:var(--c4);color:var(--c4);opacity:0.5;cursor:default}
.mission-card.done-card{opacity:0.45}
.lb-table{width:100%;border-collapse:collapse;margin-bottom:1.5rem;table-layout:fixed}
.lb-table th{font-size:11px;letter-spacing:2px;color:var(--c2);border-bottom:1px solid var(--c2);padding:12px 24px;text-align:left;opacity:0.8}
.lb-table td{font-size:15px;padding:14px 24px;border-bottom:1px solid var(--c2);letter-spacing:1px;color:var(--c3);opacity:0.8}
.lb-rank{color:var(--c2);font-size:11px}
.lb-rank.gold{color:#ffd700}
.lb-rank.silver{color:var(--c4)}
.lb-rank.bronze{color:var(--c1)}
.lb-score{text-align:right;font-weight:700;color:var(--c1)}
.lb-bar-bg{height:4px;background:var(--bg3);width:140px}
.lb-bar-fill{height:3px;background:var(--c1)}
.flip-enter{animation:flipIn 0.35s ease}
.notify-box{background:var(--bg2);border:1.5px solid var(--c1);color:var(--c1);font-family:'Courier New',monospace;font-size:13px;letter-spacing:2px;padding:10px 28px;text-align:center;margin-bottom:1rem;display:none;text-shadow:var(--s1)}
.notify-box.show{display:block}
input{background:var(--bg2);border:1px solid var(--c2);color:var(--c1);padding:8px 12px;font-family:'Courier New',monospace;font-size:13px;letter-spacing:1px;outline:none;width:100%;margin-bottom:8px}
input::placeholder{color:var(--c2);opacity:0.5}
</style>
</head>
<body>
<div id="app">
  <div id="mainMenu" class="screen active">
    <div class="menu-bg" id="menuBg">
      <div class="scanwrap">
        <div class="big-title">SIDE QUEST</div>
      </div>
      <div class="sub">[ COMPLETE MISSIONS. EARN POINTS. ]</div>
      <button class="menu-btn" onclick="showScreen('missions')">START</button>
      <button class="menu-btn" onclick="showScreen('leaderboard')">LEADERBOARD</button>
      <button class="menu-btn" onclick="showScreen('support')">SUPPORT</button>
      <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">⬡ SWITCH THEME: PIXEL GREEN</button>
    </div>
  </div>
  <div id="missions" class="screen">
    <button class="back-btn" onclick="showScreen('mainMenu')">← BACK</button>
    <div class="screen-title">// MISSIONS</div>
    <div class="score-bar">
      <span class="score-label">SESSION SCORE</span><span id="activePlayerName" style="font-size:11px;letter-spacing:2px;color:var(--c1);flex:0 0 auto;opacity:0.8"></span>
      <span class="score-val" id="sessionScore">+0 PTS</span>
      <button class="refresh-btn" onclick="regenerateMissions()">⟳ NEW SET</button>
    </div>
    <div class="missions-grid" id="missionsGrid"></div>
  </div>
  <div id="leaderboard" class="screen">
    <button class="back-btn" onclick="showScreen('mainMenu')">← BACK</button>
    <div class="screen-title">// LEADERBOARD</div>
    <table class="lb-table">
      <thead><tr><th>#</th><th>PLAYER</th><th></th><th style="text-align:right">SCORE</th></tr></thead>
      <tbody id="lbBody"></tbody>
    </table>
  </div>
  <div id="profile" class="screen" style="max-width:460px;margin:0 auto">
    <div class="screen-title">// SELECT PLAYER</div>
    <div id="profileList" style="margin-bottom:1.5rem"></div>
    <div style="border:1px solid var(--c2);background:var(--bg2);padding:1.2rem;margin-bottom:1rem">
      <div style="font-size:10px;letter-spacing:2px;color:var(--c2);margin-bottom:0.75rem">NEW PLAYER</div>
      <div style="display:flex;gap:8px">
        <input id="nicknameInput" placeholder="NİCKNAME GİR..." style="flex:1;margin-bottom:0">
        <button class="menu-btn" style="width:auto;padding:0 16px;margin:0;font-size:12px" onclick="createProfile()">CREATE</button>
      </div>
      <div id="profileError" style="font-size:11px;color:#ff0055;margin-top:6px;display:none"></div>
    </div>
    <button class="back-btn" onclick="showScreen('mainMenu')">← BACK</button>
  </div>
  <div id="support" class="screen" style="max-width:460px;margin:0 auto">
    <button class="back-btn" onclick="showScreen('mainMenu')">← BACK</button>
    <div class="screen-title">// SUPPORT</div>
    <div style="border:1px solid var(--c2);padding:1.5rem;background:var(--bg2);text-align:center;margin-bottom:1rem;">
      <div style="font-size:11px;letter-spacing:2px;color:var(--c2);margin-bottom:0.5rem">DESTEK OL</div>
      <div style="font-size:13px;color:var(--c3);line-height:1.9">Bu projeyi desteklemek için<br>aşağıdan bağış yapabilirsin.</div>
    </div>
    <input placeholder="Kart numarası">
    <input placeholder="Ad Soyad">
    <div id="supportNotify" class="notify-box">BAĞIŞ ALINDI — TEŞEKKÜRLER!</div>
    <button class="menu-btn" onclick="document.getElementById('supportNotify').classList.add('show')">BAĞIŞ YAP</button>
  </div>
</div>
<script>
const MISSIONS=[
  {title:"MISSION LOUD",desc:"Arkadaşına aniden yüksek sesle seslen ve yüzüne bak.",diff:"easy",pts:100},
  {title:"MISSION BLIND",desc:"Gözlerin kapalıyken telefon numaranı ezberden söyle.",diff:"easy",pts:150},
  {title:"MISSION MIRROR",desc:"30 saniye boyunca aynaya bakarak ciddi bir monolog yap.",diff:"easy",pts:120},
  {title:"MISSION FREEZE",desc:"Herkes hareket ederken tam 10 saniye donuk kal.",diff:"medium",pts:250},
  {title:"MISSION ACCENT",desc:"Sonraki 5 dakika boyunca yabancı bir aksanla konuş.",diff:"medium",pts:300},
  {title:"MISSION CHEF",desc:"Yanındaki kişiye sahip olduğun en lezzetli yemeği anlat, tamamen uydur.",diff:"easy",pts:130},
  {title:"MISSION SILENT",desc:"5 dakika boyunca hiçbir şey söylemeden sadece el kol hareketleriyle iletişim kur.",diff:"medium",pts:280},
  {title:"MISSION COMPLIMENT",desc:"Yanındaki herkese tek tek gerçek bir iltifat söyle.",diff:"easy",pts:110},
  {title:"MISSION BOSS",desc:"Bir arkadaşına 2 dakika boyunca bir şirketi yönetiyormuş gibi emir ver.",diff:"medium",pts:220},
  {title:"MISSION PHONE",desc:"Birisini ara ve onlara tamamen sahte bir haber ver, inandırmaya çalış.",diff:"hard",pts:400},
  {title:"MISSION DANCE",desc:"En yakın kişiye 20 saniye boyunca solo bir dans gösterisi sun.",diff:"medium",pts:260},
  {title:"MISSION ROBOT",desc:"Bir robotu taklit ederek odanın bir ucundan diğerine geç.",diff:"easy",pts:140},
  {title:"MISSION WHISPER",desc:"Bir arkadaşına en derin sırrını fısıldayarak söyle, tamamen uydur.",diff:"hard",pts:380},
  {title:"MISSION HISTORIAN",desc:"Yaşadığın şehrin 5 tarihi gerçeğini uydurarak anlat.",diff:"hard",pts:420},
  {title:"MISSION OPERA",desc:"Bir sonraki cümleyi şarkı söyleyerek söyle.",diff:"medium",pts:200},
  {title:"MISSION INVISIBLE",desc:"Yanındaki kişi seni görmüyormuş gibi davran, tam 3 dakika.",diff:"hard",pts:450},
  {title:"MISSION DETECTIVE",desc:"Yanındaki birisini sadece bakışlarından analiz et, 1 dakika.",diff:"medium",pts:230},
  {title:"MISSION EXTREME COLD",desc:"Soğuk suyun içine elini daldır ve 15 saniye say.",diff:"extreme",pts:600},
  {title:"MISSION CONFESSION",desc:"Bugün yaptığın en garip şeyi yüksek sesle itiraf et.",diff:"easy",pts:160},
  {title:"MISSION BACKWARDS",desc:"Bir cümleyi kelimelerini tersine sıralayarak söyle.",diff:"medium",pts:210},
  {title:"MISSION DEBATE",desc:"Absürd bir konuyu 2 dakika boyunca savun.",diff:"hard",pts:390},
  {title:"MISSION STATUE",desc:"Rastgele bir poz al ve tam 20 saniye boyunca kımıldama.",diff:"easy",pts:130},
  {title:"MISSION KARAOKE",desc:"Bildiğin bir şarkının nakarat kısmını sesli söyle.",diff:"medium",pts:270},
  {title:"MISSION ALIEN",desc:"Kendini dünyayı ilk gören bir uzaylı gibi tanıt.",diff:"hard",pts:410},
];
const LB=[
  {name:"NEXUS_VII",score:2450},{name:"GHOST_R",score:1980},
  {name:"PIXEL_X",score:1750},{name:"CIPHER",score:1420},
  {name:"VORTEX",score:1200},{name:"ZERO_K",score:980},
  {name:"NOVA_9",score:750},{name:"FLUX",score:520},
];
let sessionScore=0,currentMissions=[],completedSet=new Set(),revealedSet=new Set();
let currentTheme='pink';
function shuffle(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function toggleTheme(){
  if(currentTheme==='pink'){
    document.body.classList.add('green-theme');
    document.getElementById('themeBtn').textContent='⬡ SWITCH THEME: NEON PINK';
    currentTheme='green';
  } else {
    document.body.classList.remove('green-theme');
    document.getElementById('themeBtn').textContent='⬡ SWITCH THEME: PIXEL GREEN';
    currentTheme='pink';
  }
}
function generateMissions(){currentMissions=shuffle(MISSIONS).slice(0,9);completedSet=new Set();revealedSet=new Set();renderMissions()}
function regenerateMissions(){generateMissions()}
function renderMissions(){
  const g=document.getElementById('missionsGrid');g.innerHTML='';
  currentMissions.forEach((m,i)=>{
    const rev=revealedSet.has(i),done=completedSet.has(i);
    const card=document.createElement('div');
    card.className='mission-card'+(rev?' revealed':'')+(done?' done-card':'');
    card.id='card-'+i;
    card.innerHTML=`<div class="card-hidden"><div class="question-mark">?</div><div class="card-diff-badge diff-${m.diff}">${m.diff.toUpperCase()}</div></div><div class="card-revealed"><div class="card-header"><div class="card-mission-label">// MISSION</div><div class="card-title">${m.title.replace('MISSION ','')}</div></div><div class="card-body"><div class="card-desc">${m.desc}</div></div><div class="card-footer"><span class="card-pts pts-${m.diff}">+${m.pts} PTS</span><button class="complete-btn${done?' done':''}" ${done?'disabled':''} id="cbtn-${i}" onclick="completeTask(event,${i})">${done?'✓ DONE':'COMPLETE'}</button></div></div>`;
    if(!rev) card.onclick=()=>revealCard(i);
    g.appendChild(card);
  });
  updateScore();
}
function revealCard(i){revealedSet.add(i);const c=document.getElementById('card-'+i);c.classList.add('revealed','flip-enter');c.onclick=null}
function completeTask(e,i){
  e.stopPropagation();if(completedSet.has(i))return;
  completedSet.add(i);sessionScore+=currentMissions[i].pts;
  const c=document.getElementById('card-'+i);c.classList.add('done-card');
  const b=document.getElementById('cbtn-'+i);b.textContent='✓ DONE';b.classList.add('done');b.disabled=true;
  updateScore();
}
function updateScore(){document.getElementById('sessionScore').textContent='+'+sessionScore+' PTS'}
function renderLeaderboard(){
  const sorted=[...LB].sort((a,b)=>b.score-a.score);
  const max=sorted[0].score;
  const body=document.getElementById('lbBody');body.innerHTML='';
  sorted.forEach((p,idx)=>{
    const rc=idx===0?'gold':idx===1?'silver':idx===2?'bronze':'';
    const rs='0'+(idx+1);
    const bw=Math.round((p.score/max)*100);
    const tr=document.createElement('tr');
    tr.innerHTML=`<td><span class="lb-rank ${rc}">${rs}</span></td><td style="letter-spacing:2px">${p.name}</td><td><div class="lb-bar-bg"><div class="lb-bar-fill" style="width:${bw}%"></div></div></td><td class="lb-score">${p.score.toLocaleString()}</td>`;
    body.appendChild(tr);
  });
}
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='leaderboard')renderLeaderboard();
  if(id==='profile')renderProfileList();
  if(id==='missions'){
    if(!activeProfile){showScreen('profile');return;}
    if(currentMissions.length===0)generateMissions();
  }
}

// === PROFILE SYSTEM ===
let activeProfile = null;
const PROFILES_KEY = 'sq_profiles_v1';
const LB_KEY = 'sq_lb_v1';

function getProfiles(){try{return JSON.parse(localStorage.getItem(PROFILES_KEY)||'[]');}catch(e){return[];}}
function saveProfiles(p){try{localStorage.setItem(PROFILES_KEY,JSON.stringify(p));}catch(e){}}
function getSharedLB(){try{return JSON.parse(localStorage.getItem(LB_KEY)||'[]');}catch(e){return[];}}
function saveSharedLB(lb){try{localStorage.setItem(LB_KEY,JSON.stringify(lb));}catch(e){}}
function upsertLB(nick,pts){
  let lb=getSharedLB();
  let ex=lb.find(x=>x.name===nick);
  if(ex){if(pts>ex.score)ex.score=pts;}else{lb.push({name:nick,score:pts});}
  saveSharedLB(lb);
}
function createProfile(){
  const nick=document.getElementById('nicknameInput').value.trim().toUpperCase().replace(/[^A-Z0-9_]/g,'');
  const err=document.getElementById('profileError');
  if(!nick||nick.length<2){err.textContent='En az 2 karakter!';err.style.display='block';return;}
  if(nick.length>14){err.textContent='Maks 14 karakter!';err.style.display='block';return;}
  let profiles=getProfiles();
  if(profiles.find(p=>p.name===nick)){err.textContent='Bu isim alınmış!';err.style.display='block';return;}
  profiles.push({name:nick,score:0});
  saveProfiles(profiles);
  upsertLB(nick,0);
  err.style.display='none';
  document.getElementById('nicknameInput').value='';
  selectProfile(nick);
}
function selectProfile(nick){
  activeProfile=nick;
  sessionScore=0;
  currentMissions=[];
  completedSet=new Set();
  revealedSet=new Set();
  const el=document.getElementById('activePlayerName');
  if(el) el.textContent=nick;
  showScreen('missions');
}
function deleteProfile(nick,e){
  e.stopPropagation();
  if(!confirm(nick+' profilini sil?'))return;
  let profiles=getProfiles().filter(p=>p.name!==nick);
  saveProfiles(profiles);
  let lb=getSharedLB().filter(p=>p.name!==nick);
  saveSharedLB(lb);
  if(activeProfile===nick){activeProfile=null;}
  renderProfileList();
}
function renderProfileList(){
  const profiles=getProfiles();
  const el=document.getElementById('profileList');
  if(!profiles.length){
    el.innerHTML='<div style="text-align:center;font-size:12px;color:var(--c2);padding:1.2rem;opacity:0.6;letter-spacing:2px;border:1px dashed var(--c2)">KAYITLI OYUNCU YOK</div>';
    return;
  }
  el.innerHTML=profiles.map(p=>{
    const isActive=p.name===activeProfile;
    return `<div style="display:flex;align-items:center;border:1.5px solid ${isActive?'var(--c1)':'var(--c2)'};background:var(--bg2);padding:10px 14px;margin-bottom:8px;cursor:pointer;gap:10px" onclick="selectProfile('${p.name}')">
      <div style="flex:1">
        <div style="font-size:14px;letter-spacing:2px;color:var(--c1);font-weight:700">${p.name}</div>
        <div style="font-size:10px;color:var(--c2);letter-spacing:1px;margin-top:3px">BEST: +${p.score} PTS</div>
      </div>
      ${isActive?'<span style="font-size:10px;letter-spacing:1px;color:var(--c1);border:1px solid var(--c1);padding:2px 8px">ACTIVE</span>':''}
      <button onclick="deleteProfile('${p.name}',event)" style="background:transparent;border:1px solid #ff005566;color:#ff0055;font-family:monospace;font-size:10px;letter-spacing:1px;padding:3px 10px;cursor:pointer">✕</button>
    </div>`;
  }).join('');
}

// Patch completeTask to save scores
const _origComplete = completeTask;
completeTask = function(e,i){
  _origComplete(e,i);
  if(activeProfile){
    let profiles=getProfiles();
    let p=profiles.find(x=>x.name===activeProfile);
    if(p&&sessionScore>p.score){p.score=sessionScore;saveProfiles(profiles);}
    upsertLB(activeProfile,sessionScore);
  }
};

// Override renderLeaderboard to use localStorage
function renderLeaderboard(){
  let lb=getSharedLB();
  if(!lb.length) lb=[...LB];
  const sorted=[...lb].sort((a,b)=>b.score-a.score).slice(0,20);
  const max=Math.max(...sorted.map(x=>x.score),1);
  const body=document.getElementById('lbBody');body.innerHTML='';
  sorted.forEach((p,idx)=>{
    const rc=idx===0?'gold':idx===1?'silver':idx===2?'bronze':'';
    const rs='0'+(idx+1);
    const bw=Math.round((p.score/max)*100);
    const isMe=p.name===activeProfile;
    const tr=document.createElement('tr');
    if(isMe) tr.style.background='var(--bg3)';
    tr.innerHTML=`<td><span class="lb-rank ${rc}">${rs}</span></td><td style="letter-spacing:2px;color:${isMe?'var(--c1)':'var(--c3)'};font-weight:${isMe?700:400}">${p.name}${isMe?' ◀':''}</td><td><div class="lb-bar-bg"><div class="lb-bar-fill" style="width:${bw}%"></div></div></td><td class="lb-score">${p.score.toLocaleString()}</td>`;
    body.appendChild(tr);
  });
}
